<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Inbox Triage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#faf8f6;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e8e0d8;padding:1.25rem 2rem;display:flex;align-items:center;gap:12px}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#c9a882}
.header-title{font-size:15px;font-weight:500;color:#2c2c2a;letter-spacing:.02em}
.header-sub{font-size:12px;color:#9a8878;margin-left:auto}
.container{max-width:680px;margin:2.5rem auto;padding:0 1.5rem}
.input-card{background:#fff;border-radius:16px;border:1px solid #e8e0d8;padding:1.75rem;margin-bottom:1.5rem}
label{font-size:12px;font-weight:500;color:#9a8878;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:8px}
textarea{width:100%;border:1px solid #e8e0d8;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;resize:none;background:#faf8f6;color:#2c2c2a;outline:none;line-height:1.6}
textarea:focus{border-color:#c9a882}
.btn{width:100%;margin-top:1rem;padding:13px;background:#c9a882;border:none;border-radius:10px;font-size:14px;font-weight:500;color:#fff;cursor:pointer}
.btn:hover{background:#b8956f}
.btn:disabled{background:#d9cfc7;cursor:not-allowed}
.urgency-banner{border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px}
.high{background:#fcebeb;border:1px solid #f09595}
.medium{background:#faeeda;border:1px solid #FAC775}
.low{background:#eaf3de;border:1px solid #C0DD97}
.urgency-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.high .urgency-dot{background:#A32D2D}
.medium .urgency-dot{background:#854F0B}
.low .urgency-dot{background:#3B6D11}
.urgency-label{font-size:13px;font-weight:500}
.high .urgency-label{color:#791F1F}
.medium .urgency-label{color:#633806}
.low .urgency-label{color:#27500A}
.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.metric{background:#fff;border:1px solid #e8e0d8;border-radius:10px;padding:14px 16px}
.metric-label{font-size:11px;color:#9a8878;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.metric-value{font-size:16px;font-weight:500;color:#2c2c2a}
.result-section{background:#fff;border:1px solid #e8e0d8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.section-label{font-size:11px;font-weight:500;color:#9a8878;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.action-text{font-size:14px;color:#2c2c2a;line-height:1.6}
.reply-box{background:#faf8f6;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.7;color:#2c2c2a;border:1px solid #e8e0d8}
.copy-btn{margin-top:8px;padding:6px 14px;background:#fff;border:1px solid #e8e0d8;border-radius:8px;font-size:12px;color:#9a8878;cursor:pointer}
.copy-btn:hover{border-color:#c9a882;color:#c9a882}
.tags-row{display:flex;flex-wrap:wrap;gap:6px}
.tag{background:#f5ede4;color:#7a5c3f;font-size:12px;padding:4px 10px;border-radius:20px}
.override-note{font-size:12px;color:#9a8878;margin-top:1rem;padding-top:1rem;border-top:1px solid #e8e0d8}
.error-box{background:#fcebeb;border:1px solid #f09595;border-radius:10px;padding:1rem;font-size:13px;color:#791F1F;margin-bottom:1rem}
.hidden{display:none}
.footer{text-align:center;font-size:11px;color:#b8a898;padding:2rem 0}
</style>
</head>
<body>
<div class="header">
  <div class="logo-dot"></div>
  <span class="header-title">Clinic Inbox Triage</span>
  <span class="header-sub">Aesthetic Clinic Assistant</span>
</div>
<div class="container">
  <div class="input-card">
    <label for="msg">Patient Message</label>
    <textarea id="msg" rows="5" placeholder="Paste or type the incoming patient message here..."></textarea>
    <button class="btn" id="btn" onclick="classify()">Classify Message</button>
  </div>
  <div id="error" class="error-box hidden"></div>
  <div id="result" class="hidden">
    <div id="banner" class="urgency-banner">
      <div class="urgency-dot"></div>
      <span class="urgency-label" id="banner-label"></span>
    </div>
    <div class="metrics-grid">
      <div class="metric"><div class="metric-label">Severity</div><div class="metric-value" id="m-severity"></div></div>
      <div class="metric"><div class="metric-label">Confidence</div><div class="metric-value" id="m-confidence"></div></div>
      <div class="metric"><div class="metric-label">Override</div><div class="metric-value" id="m-override"></div></div>
    </div>
    <div class="result-section">
      <div class="section-label">Recommended Action</div>
      <div class="action-text" id="r-action"></div>
    </div>
    <div class="result-section">
      <div class="section-label">Safe Draft Reply</div>
      <div class="reply-box" id="r-reply"></div>
      <button class="copy-btn" onclick="copyReply()">Copy reply</button>
    </div>
    <div class="result-section">
      <div class="section-label">Reasoning Tags</div>
      <div class="tags-row" id="r-tags"></div>
      <div id="r-override" class="override-note hidden">Policy override was triggered on this message.</div>
    </div>
  </div>
</div>
<div class="footer">Clinic Inbox Triage v1.0 — All urgent classifications require human review.</div>
<script>
async function classify(){
  const text=document.getElementById("msg").value.trim();
  const btn=document.getElementById("btn");
  btn.disabled=true;btn.textContent="Classifying...";
  document.getElementById("error").classList.add("hidden");
  document.getElementById("result").classList.add("hidden");
  try{
    const res = await fetch("https://clinic-inbox-triage.onrender.com/classify",",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:"msg_"+Date.now(),text:text})});
    const data=await res.json();
    const s=data.severity;
    const banner=document.getElementById("banner");
    banner.className="urgency-banner "+s;
    const label=data.primary_label.replace(/_/g," ");
    document.getElementById("banner-label").textContent=(s==="high"?"Urgent":s==="medium"?"Review needed":"Routine")+" — "+label;
    document.getElementById("m-severity").textContent=s.charAt(0).toUpperCase()+s.slice(1);
    document.getElementById("m-confidence").textContent=Math.round(data.confidence*100)+"%";
    document.getElementById("m-override").textContent=data.policy_override_triggered?"Yes":"No";
    document.getElementById("r-action").textContent=data.recommended_action;
    document.getElementById("r-reply").textContent=data.safe_reply;
    const tagsEl=document.getElementById("r-tags");
    tagsEl.innerHTML=data.reasoning_tags.map(t=>"<span class='tag'>"+t+"</span>").join("");
    const ov=document.getElementById("r-override");
    data.policy_override_triggered?ov.classList.remove("hidden"):ov.classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
  }catch(e){
    const err=document.getElementById("error");
    err.textContent="Error: "+e.message;
    err.classList.remove("hidden");
  }finally{
    btn.disabled=false;btn.textContent="Classify Message";
  }
}
function copyReply(){
  const text=document.getElementById("r-reply").textContent;
  navigator.clipboard.writeText(text).then(()=>alert("Reply copied to clipboard."));
}
</script>
</body>
</html>
